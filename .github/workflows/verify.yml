name: verify

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.19.0"

      - name: Print runtime platform
        run: node -p "JSON.stringify({ node: process.version, platform: process.platform, arch: process.arch })"

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Run policy regression tests
        run: npm test

      - name: Run local verification
        run: bash scripts/verify-local.sh --offline

      - name: Run redaction benchmark
        run: npm run benchmark:redaction

      - name: Verify release metadata
        run: npm run release:identity

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Pi host and pinned add-on dependency audit
        run: npm run audit:runtime

      - name: Verify release tag and commit identity
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git cat-file -t "refs/tags/$RELEASE_TAG")" = "tag"
          test "$(git rev-parse "refs/tags/$RELEASE_TAG^{}")" = "$RELEASE_COMMIT"
          npm run release:identity -- --tag "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          PI_COMPANY_EXPECTED_RELEASE_COMMIT="$RELEASE_COMMIT" bash scripts/install-global.sh --stable --dry-run --no-model-scope
